<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DHYAN • Aesthetic Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(
135deg,
#fff7fb,
#eef7ff,
#fffdf7
);
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:800;
letter-spacing:8px;
z-index:999999;
}

/* PROGRESS BAR */

.progress{
position:fixed;
top:0;
left:0;
height:4px;
width:0%;
background:black;
z-index:99999;
}

/* FLOATING COLORS */

.bg-circle{
position:fixed;
border-radius:50%;
filter:blur(90px);
z-index:-1;
opacity:.7;
}

.c1{
width:250px;
height:250px;
background:#ffdce8;
top:20px;
left:-100px;
}

.c2{
width:300px;
height:300px;
background:#dbeafe;
right:-120px;
bottom:50px;
}

.c3{
width:220px;
height:220px;
background:#fff0c7;
top:40%;
left:40%;
}

/* NAVBAR */

.navbar{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 35px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.4);
border-radius:50px;
z-index:9999;
box-shadow:0 10px 30px rgba(0,0,0,.08);
font-weight:700;
letter-spacing:4px;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
text-align:center;
}

.hero img{
width:360px;
max-width:90%;
height:auto;
border-radius:35px;
border:8px solid white;
box-shadow:0 25px 60px rgba(0,0,0,.15);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-12px);
}
}

.hero h1{
margin-top:25px;
font-size:72px;
font-weight:800;
letter-spacing:8px;
color:#222;
}

.hero p{
margin-top:10px;
font-size:18px;
letter-spacing:4px;
color:#666;
}

.counter{
margin-top:25px;
padding:12px 25px;
background:white;
border-radius:40px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
font-weight:600;
}

.scroll{
margin-top:30px;
font-size:14px;
color:#888;
letter-spacing:3px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(10px);
}
}

/* GALLERY */

.gallery{
column-count:4;
column-gap:22px;
padding:35px;
max-width:1700px;
margin:auto;
}

.card{
break-inside:avoid;
margin-bottom:22px;
background:white;
padding:10px;
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,.08);
transition:.4s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:auto;
display:block;
border-radius:18px;
cursor:pointer;
transition:.5s;
}

.card:hover img{
transform:scale(1.05);
}

/* VIEWER */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.viewer img{
max-width:95%;
max-height:95%;
border-radius:15px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:50px;
color:white;
cursor:pointer;
}

/* TOP BUTTON */

.top-btn{
position:fixed;
right:20px;
bottom:20px;
width:55px;
height:55px;
border-radius:50%;
border:none;
background:black;
color:white;
font-size:24px;
cursor:pointer;
display:none;
z-index:9999;
}

/* FOOTER */

footer{
padding:60px 20px;
text-align:center;
}

.footer-name{
font-size:34px;
font-weight:700;
}

.footer-text{
margin-top:10px;
letter-spacing:3px;
color:#777;
}

/* MOBILE */

@media(max-width:1200px){
.gallery{
column-count:3;
}
}

@media(max-width:768px){

.gallery{
column-count:2;
}

.hero h1{
font-size:50px;
}

}

@media(max-width:500px){

.gallery{
column-count:1;
}

.hero h1{
font-size:42px;
}

}

</style>
</head>

<body>


<div id="loader">DHYAN</div>

<div class="progress" id="progress"></div>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>
<div class="bg-circle c3"></div>

<div class="navbar">
DHYAN
</div>

<section class="hero">

<img src="https://i.ibb.co/NdL7P9PM/IMG-20260604-WA0050.jpg">

<p>AESTHETIC • DREAMY • VIBES</p>



<div class="scroll">
SCROLL DOWN ↓

<script>

`;
const gallery = document.getElementById("gallery");

const links = imageLinks.trim().split("\n");

links.forEach(link => {

const img = link.trim();

if(img !== ""){

gallery.innerHTML += `
<div class="card">
<img src="${img}"
loading="lazy"
onclick="openViewer('${img}')">
</div>
`;

}

});

function openViewer(src){

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImg").src=src;

document.body.style.overflow="hidden";

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

document.body.style.overflow="auto";

}

document.getElementById("viewer").addEventListener("click",function(e){

if(e.target.id==="viewer"){

closeViewer();

}

});

/* LOADER */

window.onload=function(){

setTimeout(()=>{

document.getElementById("loader").style.display="none";

},800);

};

/* SCROLL PROGRESS */

window.addEventListener("scroll",()=>{

let scrollTop=document.documentElement.scrollTop;

let scrollHeight=document.documentElement.scrollHeight-document.documentElement.clientHeight;

let progress=(scrollTop/scrollHeight)*100;

document.getElementById("progress").style.width=progress+"%";

});

/* TOP BUTTON */

const topBtn=document.getElementById("topBtn");

window.addEventListener("scroll",()=>{

if(window.scrollY>500){

topBtn.style.display="block";

}
else{

topBtn.style.display="none";

}

});

topBtn.addEventListener("click",()=>{

window.scrollTo({
top:0,
behavior:"smooth"
});

});

</script>

<audio id="bgMusic">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">
    ▶ Play Music
</button>

<footer>

<div class="footer-name">
DHYAN DAVARIYA
</div>

<div class="footer-text">
AESTHETIC • DREAMY • VIBES
</div>
<!-- MUSIC BUTTON -->




<style>
#musicBtn{
position:fixed;
left:20px;
bottom:20px;
padding:12px 20px;
border:none;
border-radius:50px;
background:#111;
color:white;
font-size:16px;
cursor:pointer;
z-index:9999;
}
</style>
</footer>
<script>

const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click",()=>{

if(music.paused){

music.play();
btn.innerHTML = "⏸ Pause Music";

}else{

music.pause();
btn.innerHTML = "▶ Play Music";

}

});

</script>
</body>

</html>
